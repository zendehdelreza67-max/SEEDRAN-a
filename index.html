<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seedran Chat | تست</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0f;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            margin-right: auto;
        }

        .status .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #34d399;
            margin-left: 6px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .chat-body {
            height: 400px;
            overflow-y: auto;
            padding: 10px 0;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-body::-webkit-scrollbar {
            width: 4px;
        }
        .chat-body::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.3);
            border-radius: 10px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2));
            border: 1px solid rgba(102, 126, 234, 0.1);
        }

        .message.ai {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .message.ai .label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.2);
            margin-bottom: 4px;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-area input:focus {
            border-color: rgba(102, 126, 234, 0.3);
            background: rgba(255, 255, 255, 0.06);
        }

        .input-area input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .input-area button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 16px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .input-area button:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.3);
        }

        .input-area button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .typing {
            align-self: flex-start;
            color: rgba(255, 255, 255, 0.2);
            font-size: 13px;
            padding: 8px 16px;
            animation: fadeIn 0.3s ease;
        }

        .typing span {
            display: inline-block;
            animation: typingBounce 1.4s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-5px); }
        }

        .error-msg {
            color: #f87171;
            font-size: 13px;
            text-align: center;
            margin-top: 8px;
            padding: 8px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(239, 68, 68, 0.1);
            display: none;
        }

        .footer {
            margin-top: 16px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        @media (max-width: 640px) {
            .chat-container {
                padding: 16px;
            }
            .chat-body {
                height: 300px;
            }
            .input-area input {
                font-size: 13px;
            }
            .input-area button {
                padding: 12px 16px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="header">
            <h1>✦ Seedran Chat</h1>
            <div class="status">
                <span class="dot"></span> آنلاین
            </div>
        </div>

        <div class="chat-body" id="chatBody">
            <!-- پیام‌ها اینجا می‌آیند -->
            <div class="message ai">
                <div class="label">✨ Seedran</div>
                سلام! 👋 من Seedran هستم. هر سوالی دارید بپرسید.
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="پیام خود را بنویسید..." />
            <button id="sendBtn" onclick="sendMessage()">ارسال</button>
        </div>

        <div class="error-msg" id="errorMsg"></div>
        <div class="footer">پاسخ‌ها توسط Gemini 1.5 Flash تولید می‌شوند</div>
    </div>

    <script>
        // ==========================================================
        // تنظیمات - آدرس Worker
        // ==========================================================
        const WORKER_URL = 'https://weathered-queen-d154.baleshtabimakhmali.workers.dev';

        // ==========================================================
        // المان‌ها
        // ==========================================================
        const chatBody = document.getElementById('chatBody');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const errorMsg = document.getElementById('errorMsg');

        let isProcessing = false;

        // ==========================================================
        // ارسال پیام
        // ==========================================================
        window.sendMessage = async function() {
            const text = messageInput.value.trim();
            if (!text || isProcessing) return;

            // نمایش پیام کاربر
            addMessage('user', text);
            messageInput.value = '';
            errorMsg.style.display = 'none';

            // غیرفعال کردن دکمه
            isProcessing = true;
            sendBtn.disabled = true;

            // نمایش تایپینگ
            addTypingIndicator();

            try {
                const response = await fetch(`${WORKER_URL}/api/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: text
                    })
                });

                const result = await response.json();

                // حذف تایپینگ
                removeTypingIndicator();

                if (response.ok && result.success) {
                    addMessage('ai', result.reply);
                } else {
                    const errorText = result.message || result.error || 'خطای ناشناخته';
                    showError(errorText);
                }
            } catch (error) {
                removeTypingIndicator();
                showError('خطا در ارتباط با سرور: ' + error.message);
            } finally {
                isProcessing = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        };

        // ==========================================================
        // توابع کمکی
        // ==========================================================
        function addMessage(type, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;

            if (type === 'ai') {
                const label = document.createElement('div');
                label.className = 'label';
                label.textContent = '✨ Seedran';
                msgDiv.appendChild(label);
            }

            const content = document.createTextNode(text);
            msgDiv.appendChild(content);

            chatBody.appendChild(msgDiv);
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        function addTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = 'Seedran در حال تایپ <span>.</span><span>.</span><span>.</span>';
            chatBody.appendChild(typingDiv);
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        function showError(text) {
            errorMsg.textContent = '❌ ' + text;
            errorMsg.style.display = 'block';
        }

        // ==========================================================
        // رویدادها
        // ==========================================================
        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        // ==========================================================
        // تمرکز اولیه روی اینپوت
        // ==========================================================
        messageInput.focus();

        console.log('✅ Seedran Chat Loaded');
        console.log('✅ Worker URL:', WORKER_URL);
    </script>

</body>
</html>
